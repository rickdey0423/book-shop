<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BookStore Pro</title>
    <style>
        /* Shared Styles */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        
        /* Navbar for Context */
        .navbar { position: absolute; top: 0; width: 100%; background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .navbar a { color: white; text-decoration: none; margin: 0 15px; }

        /* Card Container */
        .auth-card {
            background: white;
            padding: 40px;
            width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-top: 60px; /* Space for navbar */
        }

        h2 { margin-bottom: 20px; color: #333; }
        
        /* Inputs */
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Login Button */
        .btn-login { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-login:hover { background: #2980b9; }

        /* Divider */
        .divider { margin: 25px 0; position: relative; border-top: 1px solid #ddd; }
        .divider span { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; color: #777; font-size: 13px; }

        /* Create Account Button (Grey) */
        .btn-create { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            background: #e7e9eb; 
            color: #333; 
            text-decoration: none; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 14px; 
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-create:hover { background: #d4d6d8; }

    </style>
</head>
<body>

    <div class="navbar">
        <strong>BookStore Pro</strong>
        <a href="index.html">Home</a>
    </div>

    <div class="auth-card">
        <h2>Sign-In</h2>
        
        <form action="profile.html">
            <div class="form-group">
                <label>Email or Mobile Number</label>
                <input type="text" placeholder="+91..." required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" required>
                <div style="text-align: right; margin-top: 5px;">
                    <a href="#" style="font-size: 12px; color: #3498db; text-decoration: none;">Forgot Password?</a>
                </div>
            </div>
            
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="divider">
            <span>New to BookStore?</span>
        </div>

        <a href="register.html" class="btn-create">Create your BookStore Account</a>
    </div>

</body>
</html>
